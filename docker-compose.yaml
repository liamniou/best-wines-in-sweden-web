services:
  # Static Web Server - no database required
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8005:8000"
    volumes:
      - ./app:/app
      - ./data:/app/data
    command: uvicorn static_server:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Static site generator - run once to generate HTML
  generator:
    build:
      context: .
      dockerfile: Dockerfile.web
    volumes:
      - ./app:/app
      - ./data:/app/data
    command: python static_site_generator.py
    profiles:
      - generator

  # Scrape Vivino toplists
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      - SUBSCRIPTION_KEY=${SUBSCRIPTION_KEY:-8d39a7340ee7439f8b4c1e995c8f3e4a}
    volumes:
      - ./app:/app
      - ./data:/app/data
    command: python scrape_vivino_toplist.py
    profiles:
      - scraper

  # Match scraped wines with Systembolaget products
  matcher:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      - SUBSCRIPTION_KEY=${SUBSCRIPTION_KEY:-8d39a7340ee7439f8b4c1e995c8f3e4a}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-70.0}
    volumes:
      - ./app:/app
      - ./data:/app/data
    command: python match_toplist_wines.py
    profiles:
      - matcher
